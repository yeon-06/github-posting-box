name: run

on:
  schedule:
    - cron: '*/5 * * * *'
  push:
    branches:
      - add-github-action

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 💻 setup java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: 🔑 chmod gradlew
        run: chmod +x gradlew
        
      - name: 🧬 bulid
        run: ./gradlew build

      - name: 🪩 execute jar성
        run: nohup java -jar ./build/libs/*.jar
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
